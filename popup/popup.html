<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        font-size: 14px;
        width: 280px;
        margin: 0;
        padding: 14px;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 4px;
      }
      .sub {
        font-size: 12px;
        color: #666;
        margin: 0 0 10px;
      }
      .host {
        font-weight: 600;
        word-break: break-all;
        margin: 0 0 8px;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 10px 0;
        gap: 8px;
      }
      .row.indent {
        margin-left: 14px;
      }
      input[type="number"] {
        width: 64px;
      }
      label.muted {
        color: #999;
      }
      .status {
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px solid #eee;
        font-size: 12px;
        color: #555;
        line-height: 1.4;
      }
      .on {
        color: #1a7f37;
        font-weight: 600;
      }
      .off {
        color: #999;
      }
    </style>
  </head>
  <body>
    <h1>Session Saver</h1>
    <p class="sub">Keeps the current site from going idle or logging you out.</p>
    <div class="host" id="host">…</div>
    <div class="row">
      <label for="toggle">Keep this site awake</label>
      <input type="checkbox" id="toggle" />
    </div>
    <div class="row indent">
      <label for="pause" id="pauseLabel" class="muted">Pause video to save resources</label>
      <input type="checkbox" id="pause" disabled />
    </div>
    <div class="row">
      <label for="interval">Activity every (sec)</label>
      <input type="number" id="interval" min="15" max="300" step="15" />
    </div>
    <div class="status" id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
